services:
  signal:
    build:
      context: ./signal
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      KLIPY_API_KEY: ${KLIPY_API_KEY:-dev-key}
    networks:
      - local-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_SIGNAL_URL: ${PUBLIC_SIGNAL_URL:-http://localhost:8080/signal}
      VITE_SFU_URL: ${PUBLIC_SFU_URL:-http://localhost:3000}
    depends_on:
      - signal
    networks:
      - local-network

  sfu:
    build:
      context: ./sfu
    ports:
      - "3000:3000"
      - "40000-40009:40000-40009/udp"
      - "40000-40009:40000-40009/tcp"
    environment:
      NODE_ENV: development
      SFU_PORT: "3000"
      ANNOUNCED_IP: "127.0.0.1"
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40009"
    networks:
      - local-network

networks:
  local-network:
    driver: bridge
