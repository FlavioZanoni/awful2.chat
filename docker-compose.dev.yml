services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_SIGNAL_URL: ${PUBLIC_SIGNAL_URL:-http://localhost:8080/signal}
      VITE_SFU_URL: ${PUBLIC_SFU_URL:-http://localhost:3000}
      VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      VITE_RELAY_MULTIADDR: ${VITE_RELAY_MULTIADDR}
    networks:
      - local-network

networks:
  local-network:
    driver: bridge
