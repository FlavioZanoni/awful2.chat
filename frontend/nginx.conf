server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy WebSocket signaling and Klipy HTTP endpoints to the signal service
    location /signal {
        proxy_pass http://signal:8080/signal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /klipy/ {
        proxy_pass http://signal:8080/klipy/;
        proxy_set_header Host $host;
    }

    # Proxy mediasoup SFU WebSocket signaling
    location /sfu {
        proxy_pass http://sfu:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
